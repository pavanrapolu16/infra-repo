apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-task-config
  namespace: ai-task-platform
data:
  MONGO_URI: mongodb://mongo:27017/aitaskplatform
  MONGO_DB_NAME: aitaskplatform
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_QUEUE_NAME: tasks_queue
  JWT_EXPIRES_IN: 7d
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "120"
  MAX_RETRIES: "2"
  POLL_TIMEOUT_SECONDS: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: ai-task-platform
data:
  REACT_APP_API_URL: /api
