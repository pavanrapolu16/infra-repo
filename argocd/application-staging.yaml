apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-task-staging
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-task-platform
  source:
    repoURL: https://github.com/pavanrapolu16/infra-repo
    targetRevision: main
    path: overlays/staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
